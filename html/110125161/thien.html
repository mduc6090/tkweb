<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Thẻ Sinh Viên</title>


<style>

thân hình {

    nền: #f5f5f5;

    font-family: Arial;

}


.card {

    Chiều rộng: 520px;

    lề: 30px tự động;

    độ cong viền: 12px;

    tràn: ẩn;

    box-shadow: 0 4px 15px rgba(0,0,0,0.2);

    Nền: trắng;

}


.header {

    background: linear-gradient(90deg, #007bff, #00c6ff);

    Màu sắc: trắng;

    căn chỉnh văn bản: ở giữa;

    khoảng cách lề: 10px;

    font-weight: bold;

}


bàn {

    chiều rộng: 100%;

}


td {

    khoảng cách lề: 10px;

}


.avatar {

    Chiều rộng: 120px;

    chiều cao: 150px;

    viền bán kính: 8px;

    viền: 2px đặc #007bff;

}


.phần {

    background: #f0f8ff;

}


.section-title {

    font-weight: bold;

    màu: #007bff;

}

</style>


</head>


<body>


<div class="card">

    <div class="header">THẺ SINH VIÊN</div>


    <bảng>

        <tr>

            <td>

                <img src=" https://via.placeholder.com/120x150 " class="avatar">

            </td>


            <td>

                <p><b>Họ tên:</b> Trịnh Minh Thiện</p>

                <p><b>L:</b> DA25TTA</p>

                <p><b>Năm sinh:</b> 2007</p>

                <p><b>Ngành:</b> CNTT</p>

            </td>

        </tr>


        <tr class="section">

            <td colspan="2">

                <p class="section-title">Hoạt động</p>

                <ul>

                    <li>Đọc</li>

                    <li>Thể thao</li>

                    <li>Lập chương trình, Chơi trò chơi</li>

                </ul>


                <p class="section-title">Thành tích</p>

                <ul>

                    <li>Sinh viên 5 tốt</li>

                   <li>Giải thích 3 cầu lông cấp trường</li>

                </ul>

            </td>

        </tr>

    </table>

</div>


</body>

</html>
